- name: Load package variables
  ansible.builtin.include_vars: "{{ item }}"
  with_items:
    - vars/main.yml
    - vars/deb.yml
    - vars/rpm.yml

- name: Install via Debian (Ubuntu)
  when: ansible_facts['os_family'] == "Debian"
  ansible.builtin.apt:
    name: "{{ (system_main_packages | default([])) + (system_deb_packages | default([])) }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install via RedHat (Fedora)
  when: ansible_facts['os_family'] == "RedHat"
  ansible.builtin.dnf:
    name: "{{ (system_main_packages | default([])) + (system_rpm_packages | default([])) }}"
    state: present
    update_cache: true
