- name: 加载npm变量
  ansible.builtin.include_vars: vars/main.yml

- name: 收集npm全局已安装的包
  ansible.builtin.command:
    cmd: "{{ npm_manager }} list -g --depth=0 --json"
  register: npm_list_raw
  changed_when: false

- name: 解析已安装包名列表
  ansible.builtin.set_fact:
    npm_installed_packages: >-
      {{
        (npm_list_raw.stdout | from_json).dependencies | default({}) | list
      }}

- name: 安装/升级工具
  ansible.builtin.include_tasks: install_an_app.yml
  loop: "{{ npm_apps | selectattr('state', 'undefined') | list
          + npm_apps | selectattr('state', 'defined') | selectattr('state', 'eq', 'present') | list }}"
  loop_control:
    loop_var: app

- name: 移除标记为 absent 的工具
  ansible.builtin.include_tasks: remove_an_app.yml
  loop: "{{ npm_apps | selectattr('state', 'defined') | selectattr('state', 'eq', 'absent') | list }}"
  loop_control:
    loop_var: app
  when: (app.package | default(app.name)) in npm_installed_packages

- name: Prune:移除不在声明列表中的工具
  ansible.builtin.include_tasks: prune_app.yml
  when: npm_app_prune | bool
