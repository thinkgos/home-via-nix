# ansible-playbook site.yml -u <username> --tags system,github,flathub,unfree --become -K
- name: 通用软件管理
  hosts: 127.0.0.1
  gather_facts: false
  environment:
    http_proxy: "http://127.0.0.1:7890"
    https_proxy: "http://127.0.0.1:7890"
    socks5_proxy: "socks5://127.0.0.1:7890"

  pre_tasks:
    - name: Ping
      tags: "always"
      ansible.builtin.ping:

    - name: Gather facts
      tags: "always"
      ansible.builtin.setup:
        gather_subset: min

  roles:
    - role: system
      tags: "system"

    - role: github
      tags: "github"

    - role: flathub
      tags: "flathub"

    - role: python
      tags: "python"

    - role: unfree
      tags: "unfree"
