<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>
    <match target="font">
        <test name="family" qual="any">
            <string>JetBrainsMono Nerd Font Mono</string>
        </test>
        <edit name="fontfeatures" mode="append">
            <string>zero</string>
        </edit>
        <edit name="fontfeatures" mode="append">
            <string>cv02</string>
        </edit>
        <edit name="fontfeatures" mode="append">
            <string>cv03</string>
        </edit>
        <edit name="fontfeatures" mode="append">
            <string>cv04</string>
        </edit>
        <edit name="fontfeatures" mode="append">
            <string>cv10</string>
        </edit>
        <edit name="fontfeatures" mode="append">
            <string>cv11</string>
        </edit>
        <edit name="fontfeatures" mode="append">
            <string>cv12</string>
        </edit>
        <edit name="fontfeatures" mode="append">
            <string>cv18</string>
        </edit>
        <edit name="fontfeatures" mode="append">
            <string>cv20</string>
        </edit>
    </match>
</fontconfig>