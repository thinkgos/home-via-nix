# ansible-playbook playbook.yml -u <username>
- name: 通用服务器管理
  tags: packages
  hosts: 127.0.0.1
  become: true
  gather_facts: true
  environment:
    http_proxy: "http://127.0.0.1:7890"
    https_proxy: "http://127.0.0.1:7890"
    socks5_proxy: "socks5://127.0.0.1:7890"
  vars_files:
    - vars/main.yml
    - vars/deb.yml
    - vars/rpm.yml
    - vars/apps.yml

  tasks:
    - name: Ping
      ansible.builtin.ping:

    - name: 系统基础配置
      ansible.builtin.include_tasks: tasks/install_packages.yml

      # BUG: 使用tags时, 无法识别facts的信息.
    - name: 安装Github上的软件
      block:
        - name: Gather the package facts
          ansible.builtin.package_facts:
            manager: auto

        - name: Process Github installations
          ansible.builtin.include_tasks: tasks/install_logic.yml
          loop: "{{ apps }}"
          loop_control:
            loop_var: app
