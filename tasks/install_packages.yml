- name: Install via Debian
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: 更新APT缓存
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: 安装列表中的包
      ansible.builtin.apt:
        name: "{{ (main_packages | default([])) + (deb_packages | default([])) }}"
        state: present

- name: Install via RedHat (Fedora/RHEL)
  when: ansible_facts['os_family'] == "RedHat"
  ansible.builtin.dnf:
    name: "{{ (main_packages | default([])) + (rpm_packages | default([])) }}"
    state: present
    update_cache: true
