- name: "Set fact: {{ app.name }}"
  ansible.builtin.set_fact:
    final_tag: >-
      {{
        (app.tag_v | default(true) | bool) |
        ternary('v' + (app.version | string | regex_replace('^v', '')), (app.version | string | regex_replace('^v', '')))
      }}
    asset_version: >-
      {{
        (app.asset_v | default(true) | bool) |
        ternary('v' + (app.version | string | regex_replace('^v', '')), (app.version | string | regex_replace('^v', '')))
      }}

- name: "Prepare final asset name: {{ app.name }}"
  ansible.builtin.set_fact:
    final_asset_name: >-
      {{
        (ansible_facts['os_family'] == 'RedHat') |
        ternary(app.redhat_pattern | replace('__VERSION__', asset_version),
                app.debian_pattern | replace('__VERSION__', asset_version))
      }}
    is_installed: >-
      {{
        app.package_name in ansible_facts.packages and
        (app.version | regex_replace('^v', '')) in (ansible_facts.packages[app.package_name] | map(attribute='version') | list)
      }}

- name: "Download final asset: {{ app.name }}"
  ansible.builtin.get_url:
    url: "https://github.com/{{ app.repo }}/releases/download/{{ final_tag }}/{{ final_asset_name }}"
    dest: "/tmp/{{ final_asset_name }}"
    mode: "0644"
  when: not is_installed
  register: download_result

- name: "Install on Debian/Ubuntu: {{ app.name }}"
  ansible.builtin.apt:
    deb: "/tmp/{{ final_asset_name }}"
    state: present
  when:
    - not is_installed
    - ansible_facts['os_family'] == "Debian"

- name: "Install on Fedora: {{ app.name }}"
  ansible.builtin.dnf:
    name: "/tmp/{{ final_asset_name }}"
    state: present
    disable_gpg_check: true
  become: true
  when:
    - not is_installed
    - ansible_facts['os_family'] == "RedHat"

- name: "Cleanup temporary file: {{ app.name }}"
  ansible.builtin.file:
    path: "/tmp/{{ final_asset_name }}"
    state: absent
  when:
    - not is_installed
    - download_result.changed
